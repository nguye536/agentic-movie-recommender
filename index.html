<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMatch — Find Your Film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0a0f;
    --paper: #f2ede6;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --red: #8b2635;
    --muted: #6b6560;
    --card-bg: #13121a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  .cursor.big { width: 48px; height: 48px; opacity: 0.4; }

  /* Film grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.35;
  }

  /* Spotlight */
  .spotlight {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    transition: left 0.4s ease, top 0.4s ease;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 3rem 4rem 0;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Hero */
  .hero {
    position: relative;
    z-index: 10;
    padding: 5rem 4rem 2rem;
    max-width: 900px;
  }

  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 2rem;
    height: 1px;
    background: var(--gold);
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-bottom: 0.2em;
  }

  .hero-title em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 1.5rem;
    letter-spacing: 0.02em;
    max-width: 400px;
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 0 4rem;
    position: relative;
    z-index: 10;
    width: calc(100% - 8rem);
  }

  /* Form section */
  .form-section {
    position: relative;
    z-index: 10;
    padding: 3rem 4rem;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 3rem;
    align-items: start;
    max-width: 1100px;
  }

  .form-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
    display: block;
  }

  .form-textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(242,237,230,0.15);
    color: var(--paper);
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-style: italic;
    font-weight: 400;
    line-height: 1.5;
    padding: 0.5rem 0 1rem;
    resize: none;
    outline: none;
    min-height: 120px;
    transition: border-color 0.3s;
  }

  .form-textarea::placeholder {
    color: rgba(242,237,230,0.2);
  }

  .form-textarea:focus {
    border-color: var(--gold);
  }

  .char-hint {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
  }

  /* History sidebar */
  .history-panel {
    border-left: 1px solid rgba(242,237,230,0.08);
    padding-left: 2rem;
  }

  .history-input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .history-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(242,237,230,0.15);
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.4rem 0;
    outline: none;
    transition: border-color 0.3s;
  }

  .history-input::placeholder { color: rgba(242,237,230,0.25); }
  .history-input:focus { border-color: var(--gold); }

  .btn-add {
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.4rem 0.8rem;
    cursor: none;
    transition: background 0.2s, border-color 0.2s;
  }

  .btn-add:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .history-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    min-height: 2rem;
  }

  .tag {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold-light);
    font-size: 0.72rem;
    padding: 0.3rem 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    letter-spacing: 0.05em;
  }

  .tag-remove {
    cursor: none;
    opacity: 0.5;
    font-size: 0.9rem;
    line-height: 1;
    transition: opacity 0.2s;
  }
  .tag-remove:hover { opacity: 1; }

  /* CTA */
  .cta-row {
    position: relative;
    z-index: 10;
    padding: 0 4rem 4rem;
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .btn-find {
    position: relative;
    background: var(--gold);
    color: var(--ink);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 1.1rem 3rem;
    cursor: none;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .btn-find::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold-light);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
  }

  .btn-find:hover::before { transform: translateX(0); }
  .btn-find:hover { transform: translateY(-1px); }
  .btn-find:active { transform: translateY(0); }

  .btn-find span { position: relative; z-index: 1; }

  .btn-find.loading { pointer-events: none; opacity: 0.7; }

  .loading-text {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    display: none;
  }
  .loading-text.visible { display: block; }

  /* Film strip decoration */
  .filmstrip {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 28px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 6px;
    opacity: 0.12;
    z-index: 5;
  }

  .filmstrip-hole {
    flex-shrink: 0;
    width: 16px;
    height: 12px;
    border: 1px solid var(--paper);
    border-radius: 2px;
  }

  /* Result card */
  .result-section {
    position: relative;
    z-index: 10;
    padding: 0 4rem 6rem;
    display: none;
  }

  .result-section.visible { display: block; }

  .result-card {
    background: var(--card-bg);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3rem;
    position: relative;
    overflow: hidden;
    animation: revealCard 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    max-width: 800px;
  }

  @keyframes revealCard {
    from { opacity: 0; transform: translateY(30px); clip-path: inset(0 0 100% 0); }
    to   { opacity: 1; transform: translateY(0);    clip-path: inset(0 0 0% 0); }
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .result-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.2);
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 0.3rem;
  }

  .result-meta {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .result-desc {
    font-size: 1.05rem;
    line-height: 1.75;
    color: rgba(242,237,230,0.85);
    font-weight: 300;
    border-left: 2px solid var(--gold);
    padding-left: 1.25rem;
  }

  .result-id {
    margin-top: 1.5rem;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }


  .result-body {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 2rem;
    align-items: start;
  }

  .result-poster {
    width: 180px;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    border: 1px solid rgba(201,168,76,0.15);
    opacity: 0;
    transition: opacity 0.4s ease 0.3s;
  }

  .result-poster.loaded { opacity: 1; }
  .result-poster.hidden { display: none; }

  @media (max-width: 600px) {
    .result-body { grid-template-columns: 1fr; }
    .result-poster { width: 120px; }
  }

  /* Error */
  .error-msg {
    color: #e07070;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    padding: 0 4rem 2rem;
    position: relative;
    z-index: 10;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* Page load animation */
  .animate-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.7s ease forwards;
  }
  .animate-in:nth-child(1) { animation-delay: 0.1s; }
  .animate-in:nth-child(2) { animation-delay: 0.2s; }
  .animate-in:nth-child(3) { animation-delay: 0.35s; }
  .animate-in:nth-child(4) { animation-delay: 0.5s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    header, .hero, .form-section, .cta-row, .result-section, .error-msg {
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
    .form-section { grid-template-columns: 1fr; }
    .history-panel { border-left: none; border-top: 1px solid rgba(242,237,230,0.08); padding-left: 0; padding-top: 1.5rem; }
    .hero-title { font-size: 3rem; }
    .divider { margin: 0 1.5rem; width: calc(100% - 3rem); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="spotlight" id="spotlight"></div>

<!-- Film strip decoration -->
<div class="filmstrip" aria-hidden="true">
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
  <div class="filmstrip-hole"></div><div class="filmstrip-hole"></div>
</div>

<header class="animate-in">
  <span class="logo">CineMatch</span>
  <span class="logo-sub">AI Film Oracle</span>
</header>

<section class="hero animate-in">
  <p class="hero-eyebrow">Powered by gemma4 · 720 films</p>
  <h1 class="hero-title">Tell us your<br><em>mood.</em></h1>
  <p class="hero-sub">Describe what you're in the mood for — a feeling, a vibe, a director you love — and we'll find your perfect film tonight.</p>
</section>

<div class="divider animate-in"></div>

<div class="form-section animate-in">
  <div class="main-input">
    <label class="form-label" for="preferences">What are you in the mood for?</label>
    <textarea
      class="form-textarea"
      id="preferences"
      rows="4"
      placeholder="Something that'll make me laugh and cry at the same time. I love Wes Anderson's visual style but want something more emotionally raw…"
    ></textarea>
    <p class="char-hint">Be as specific or as vague as you like.</p>
  </div>

  <div class="history-panel">
    <label class="form-label">Already watched</label>
    <div class="history-input-row">
      <input class="history-input" id="history-input" type="text" placeholder="Add a title…" />
      <button class="btn-add" onclick="addHistory()">Add</button>
    </div>
    <div class="history-tags" id="history-tags"></div>
  </div>
</div>

<div class="cta-row">
  <button class="btn-find" id="btn-find" onclick="getRecommendation()">
    <span id="btn-text">Find My Film</span>
  </button>
  <p class="loading-text" id="loading-text">Consulting the oracle…</p>
</div>

<p class="error-msg" id="error-msg"></p>

<section class="result-section" id="result-section">
  <div class="result-card" id="result-card">
    <div class="result-label">Tonight's recommendation</div>
    <div class="result-body">
      <img class="result-poster" id="result-poster" src="" alt="" />
      <div class="result-content">
        <h2 class="result-title" id="result-title"></h2>
        <p class="result-meta" id="result-meta"></p>
        <p class="result-desc" id="result-desc"></p>
        <p class="result-id" id="result-id"></p>
      </div>
    </div>
  </div>
</section>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const spotlight = document.getElementById('spotlight');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    spotlight.style.left = e.clientX + 'px';
    spotlight.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('button, textarea, input, .tag-remove').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });

  // History management
  const history = [];
  async function addHistory() {
    const input = document.getElementById('history-input');
    const val = input.value.trim();
    if (!val || history.find(h => h.name.toLowerCase() === val.toLowerCase())) return;
    const item = { name: val, tmdb_id: 0 };
    history.push(item);
    renderTags();
    input.value = '';
    // Silently resolve partial/fuzzy title to real tmdb_id + canonical name
    try {
      const resp = await fetch(`${API_BASE}/search?q=${encodeURIComponent(val)}&limit=1`);
      const data = await resp.json();
      if (data.results && data.results.length > 0) {
        item.tmdb_id = data.results[0].tmdb_id;
        item.name = data.results[0].title;
        renderTags();
      }
    } catch {}
  }

  document.getElementById('history-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addHistory(); }
  });

  function removeHistory(name) {
    const idx = history.findIndex(h => h.name === name);
    if (idx > -1) history.splice(idx, 1);
    renderTags();
  }

  function renderTags() {
    const container = document.getElementById('history-tags');
    container.innerHTML = history.map(h => `
      <span class="tag">
        ${h.name}
        <span class="tag-remove" onclick="removeHistory('${h.name.replace(/'/g, "\\'")}')">×</span>
      </span>
    `).join('');
  }

  // API call
  const API_BASE = window.location.origin;

  async function getRecommendation() {
    const preferences = document.getElementById('preferences').value.trim();
    if (!preferences) {
      document.getElementById('preferences').focus();
      return;
    }

    const btn = document.getElementById('btn-find');
    const btnText = document.getElementById('btn-text');
    const loadingText = document.getElementById('loading-text');
    const errorMsg = document.getElementById('error-msg');
    const resultSection = document.getElementById('result-section');

    btn.classList.add('loading');
    btnText.textContent = '✦';
    loadingText.classList.add('visible');
    errorMsg.classList.remove('visible');
    resultSection.classList.remove('visible');

    try {
      const resp = await fetch(`${API_BASE}/recommend`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: 1,
          preferences,
          history: history.map(h => ({ tmdb_id: h.tmdb_id, name: h.name }))
        })
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || 'Something went wrong');
      }

      const data = await resp.json();

      document.getElementById('result-title').textContent = data.title || ('Film #' + data.tmdb_id);
      document.getElementById('result-meta').textContent = (data.year ? data.year + ' · ' : '') + (data.genres || '') + ' · TMDB ' + data.tmdb_id;
      document.getElementById('result-desc').textContent = data.description;
      document.getElementById('result-id').textContent = 'tmdb_id: ' + data.tmdb_id;

      const poster = document.getElementById('result-poster');
      if (data.poster) {
        poster.classList.remove('hidden');
        poster.src = data.poster;
        poster.alt = data.title + ' poster';
        poster.onload = () => poster.classList.add('loaded');
        poster.onerror = () => poster.classList.add('hidden');
      } else {
        poster.classList.add('hidden');
      }

      // Re-animate card
      const card = document.getElementById('result-card');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = '';

      resultSection.classList.add('visible');
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      errorMsg.textContent = '— ' + err.message;
      errorMsg.classList.add('visible');
    } finally {
      btn.classList.remove('loading');
      btnText.textContent = 'Find My Film';
      loadingText.classList.remove('visible');
    }
  }
</script>
</body>
</html>
